<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Modelo GLB</title>

    <!-- THREE.js -->
    <script src="js/three.js"></script>
    <script src="js/GLTFLoader.js"></script>

    <!-- jsartoolkit -->
    <script src="jsartoolkit5/artoolkit.min.js"></script>
    <script src="jsartoolkit5/artoolkit.api.js"></script>

    <!-- AR.js / THREEx -->
    <script src="threex/threex-artoolkitsource.js"></script>
    <script src="threex/threex-artoolkitcontext.js"></script>
    <script src="threex/threex-arbasecontrols.js"></script>
    <script src="threex/threex-armarkercontrols.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<script>

var scene, camera, renderer, clock, deltaTime, totalTime;
var arToolkitSource, arToolkitContext;
var markerRoot1;

initialize();
animate();

function initialize()
{
    scene = new THREE.Scene();

    let ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);

    camera = new THREE.Camera();
    scene.add(camera);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(640, 480);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();
    deltaTime = 0;
    totalTime = 0;

    //---------------------------------------------------------
    // ARToolkitSource
    //---------------------------------------------------------
    arToolkitSource = new THREEx.ArToolkitSource({
        sourceType: 'webcam'
    });

    function onResize() {
        arToolkitSource.onResize();
        arToolkitSource.copySizeTo(renderer.domElement);
        if (arToolkitContext.arController !== null) {
            arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
        }
    }

    arToolkitSource.init(function onReady() {
        onResize();
    });

    window.addEventListener('resize', function () {
        onResize();
    });

    //---------------------------------------------------------
    // ARToolkitContext
    //---------------------------------------------------------
    arToolkitContext = new THREEx.ArToolkitContext({
        cameraParametersUrl: 'data/camera_para.dat',
        detectionMode: 'mono'
    });

    arToolkitContext.init(function onCompleted() {
        camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
    });

    //---------------------------------------------------------
    // Marker
    //---------------------------------------------------------
    markerRoot1 = new THREE.Group();
    scene.add(markerRoot1);

    let markerControls1 = new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
        type: 'pattern',
        patternUrl: "data/hiro.patt"
    });

    //---------------------------------------------------------
    // PLANO AZUL (para comprobar detección)
    //---------------------------------------------------------
    let geometry1 = new THREE.PlaneGeometry(1, 1);
    let material1 = new THREE.MeshBasicMaterial({ color: 0x0000ff, opacity: 0.5, transparent: true });
    let mesh1 = new THREE.Mesh(geometry1, material1);
    mesh1.rotation.x = -Math.PI / 2;
    markerRoot1.add(mesh1);

    //---------------------------------------------------------
    // CARGAR MODELO GLB
    //---------------------------------------------------------
    let loader = new THREE.GLTFLoader();

    loader.load("models/modelo.glb", function (gltf) {

        let model = gltf.scene;
        model.scale.set(0.1, 0.1, 0.1);   // Ajusta tamaño
        model.position.y = 0.25;          // Sube un poco
        markerRoot1.add(model);

    }, undefined, function (error) {
        console.error("Error cargando modelo GLB:", error);
    });
}

function update() {
    if (arToolkitSource.ready !== false)
        arToolkitContext.update(arToolkitSource.domElement);
}

function render() {
    renderer.render(scene, camera);
}

function animate() {
    requestAnimationFrame(animate);
    deltaTime = clock.getDelta();
    totalTime += deltaTime;
    update();
    render();
}

</script>

</body>
</html>
