<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- He añadido ?v=2 para que el móvil no use la versión vieja -->
            <a-asset-item id="modelo" src="enano.glb?v=2"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- PRUEBA DE TAMAÑO: Escala 10 para ver si aparece -->
            <!-- Si sale muy grande, luego lo bajamos a 1 -->
            <a-entity 
                gltf-model="#modelo" 
                scale="10 10 10" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
