<!DOCTYPE html>
<html>
<head>
    <title>Proyecto AR - Astronauta</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <!-- REVISA: El nombre debe ser idéntico al de tu lista de GitHub -->
            <a-asset-item id="modelo" src="enano.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- Ponemos escala 1 1 1 porque ya es pequeño desde Blender -->
            <a-entity 
                gltf-model="#modelo"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
