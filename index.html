<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- REVISA: El nombre debe ser idéntico: enano2.glb -->
            <a-asset-item id="casa" src="modelo1.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- Empezamos con escala 1. Si sale muy pequeña, pon 5 5 5. Si sale gigante, 0.1 0.1 0.1 -->
            <a-entity 
                gltf-model="#casa" 
                scale="1 1 1" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
