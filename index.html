<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Notre Dame AR - Centrada</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false;"
        arjs="sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10;">
        
        <a-assets>
            <!-- He puesto v=v22 para que el móvil SE OBLIGUE a descargar el cambio -->
            <a-asset-item id="catedral" src="catedral.glb?v=v22"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" smooth="true" smoothCount="10">
            <!-- POSITION: 0 0 0.7 -->
            <!-- 0.7 es el punto medio para que no esté ni muy arriba ni muy abajo -->
            <a-entity 
                gltf-model="#catedral" 
                scale="0.00030 0.00030 0.00030" 
                position="0 0 0.2" 
                rotation="90 180 0">
            </a-entity>
        </a-marker>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
