<!DOCTYPE html>
<html>
<head>
    <title>Proyecto AR - Modelo 3D</title>
    <!-- Cargamos las librerías que usa Stemkoski pero desde enlaces rápidos -->
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- Asegúrate de que el archivo modelo.glb esté en la lista principal de archivos -->
            <a-asset-item id="casa" src="enano.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- Aquí corregimos el tamaño -->
            <!-- scale="0.01" significa que la casa es 100 veces más pequeña que el original -->
            <a-entity 
                gltf-model="#casa" 
                scale="0.01 0.01 0.01" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
